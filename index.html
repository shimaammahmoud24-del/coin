<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coin Battle Game</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#1a1a1a,#000);
    color:white;
    font-family:Arial;
}

h1{
    color:gold;
    text-shadow:0 0 10px gold;
}

/* players */
.players{
    display:flex;
    gap:30px;
    margin:10px;
}

.player{
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    text-align:center;
}

/* buttons */
button{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(45deg,gold,orange);
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

/* scene */
.scene{
    width:200px;
    height:200px;
    perspective:1000px;
    margin:15px;
}

/* coin */
.coin{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 1.2s ease;
}

.side{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
    font-weight:bold;
    backface-visibility:hidden;

    background: radial-gradient(circle at 30% 30%, #fff7b0, #d4af37, #7a5b10);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 15px gold;
}

.front{ transform:rotateY(0deg); }
.back{ transform:rotateY(180deg); }

/* score */
.score{
    margin-top:15px;
    font-size:20px;
    color:yellow;
}

#turn{
    margin:10px;
    color:cyan;
}
</style>

</head>

<body>

<h1>🪙 Coin Battle Game</h1>

<div id="turn">Choose your side</div>

<div class="players">

<div class="player">
<h3>Player (1)    </h3>
<button onclick="choose(1,'HEADS')">HEADS</button>
<button onclick="choose(1,'TAILS')">TAILS</button>
<p id="p1Text">Not chosen</p>
</div>

<div class="player">
<h3>Player (2)    </h3>
<button onclick="choose(2,'HEADS')">HEADS</button>
<button onclick="choose(2,'TAILS')">TAILS</button>
<p id="p2Text">Not chosen</p>
</div>

</div>

<div class="scene">
    <div class="coin" id="coin">
        <div class="side front">HEADS</div>
        <div class="side back">TAIL</div>
    </div>
</div>

<button onclick="flip()">FLIP COIN</button>

<div class="score">
Player (1): <span id="p1">0</span> 
Player (2): <span id="p2">0</span>
</div>

<script>
let coin = document.getElementById("coin");

let p1Choice = null;
let p2Choice = null;

let p1Score = 0;
let p2Score = 0;

function choose(player, choice){

    if(player === 1){
        p1Choice = choice;
        document.getElementById("p1Text").innerText = choice;
    } else {
        p2Choice = choice;
        document.getElementById("p2Text").innerText = choice;
    }
}

function flip(){

    if(!p1Choice || !p2Choice){
        alert("Both players must choose!");
        return;
    }

    let spin = Math.random()*2000 + 1000;

    coin.style.transform = `rotateY(${spin}deg)`;

    setTimeout(() => {

        let result = Math.random() < 0.5 ? "HEADS" : "TAILS";

        if(result === "HEADS"){
            coin.style.transform = "rotateY(0deg)";
        } else {
            coin.style.transform = "rotateY(180deg)";
        }

        if(p1Choice === result) p1Score++;
        if(p2Choice === result) p2Score++;

        document.getElementById("p1").innerText = p1Score;
        document.getElementById("p2").innerText = p2Score;

        checkWinner();

        p1Choice = null;
        p2Choice = null;

        document.getElementById("p1Text").innerText = "Not chosen";
        document.getElementById("p2Text").innerText = "Not chosen";

    },1200);
}

function checkWinner(){
    if(p1Score === 5){
        alert("🏆 Player (1) Wins!");
        reset();
    }
    if(p2Score === 5){
        alert("🏆 Player (2) Wins!");
        reset();
    }
}

function reset(){
    p1Score = 0;
    p2Score = 0;

    document.getElementById("p1").innerText = 0;
    document.getElementById("p2").innerText = 0;
}
</script>

</body>
</html>
